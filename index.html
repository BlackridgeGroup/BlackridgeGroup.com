<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
  <title>Blackridge Group — Private Access</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500;600&family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">

  <style>
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --gold-light: #f0d060;
      --gold: #d4af37;
      --gold-mid: #b8942a;
      --gold-dark: #7a5c10;
      --gold-muted: rgba(212,175,55,0.15);
      --black: #000000;
      --deep: #050505;
      --surface: #0a0a0a;
      --surface2: #111111;
      --text: #e8d5a0;
      --text-dim: rgba(212,175,55,0.45);
      --border: rgba(212,175,55,0.18);
      --border-bright: rgba(212,175,55,0.45);
    }

    html, body {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: var(--black);
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100dvh;
      position: relative;
    }

    /* ── BACKGROUND ── */
    .bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .bg-grid {
      position: absolute;
      inset: 0;
      background-image:
        linear-gradient(rgba(212,175,55,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(212,175,55,0.04) 1px, transparent 1px);
      background-size: 60px 60px;
      animation: gridDrift 30s linear infinite;
    }

    @keyframes gridDrift {
      0% { transform: translateY(0); }
      100% { transform: translateY(60px); }
    }

    .bg-radial {
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 50% -10%, rgba(212,175,55,0.12) 0%, transparent 70%),
        radial-gradient(ellipse 40% 30% at 80% 110%, rgba(212,175,55,0.06) 0%, transparent 60%),
        radial-gradient(ellipse 100% 80% at 50% 50%, #050505 30%, #000 100%);
    }

    .bg-lines {
      position: absolute;
      inset: 0;
      overflow: hidden;
    }

    .bg-lines::before,
    .bg-lines::after {
      content: '';
      position: absolute;
      width: 1px;
      height: 100%;
      background: linear-gradient(to bottom, transparent, rgba(212,175,55,0.2), transparent);
      animation: linePulse 4s ease-in-out infinite;
    }

    .bg-lines::before { left: 20%; animation-delay: 0s; }
    .bg-lines::after  { right: 20%; animation-delay: 2s; }

    @keyframes linePulse {
      0%, 100% { opacity: 0.3; }
      50% { opacity: 0.7; }
    }

    /* ── MAIN PANEL ── */
    .panel {
      position: relative;
      z-index: 10;
      width: 100%;
      max-width: 420px;
      margin: 0 auto;
      padding: 16px;
      animation: panelReveal 1s cubic-bezier(0.16, 1, 0.3, 1) both;
    }

    @keyframes panelReveal {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card {
      background: linear-gradient(160deg, rgba(20,20,20,0.98) 0%, rgba(8,8,8,0.99) 100%);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 48px 36px 40px;
      position: relative;
      overflow: hidden;
      backdrop-filter: blur(20px);
      box-shadow:
        0 0 0 1px rgba(0,0,0,0.8),
        0 40px 80px rgba(0,0,0,0.8),
        0 0 60px rgba(212,175,55,0.04),
        inset 0 1px 0 rgba(212,175,55,0.1);
    }

    /* Corner accents */
    .card::before,
    .card::after {
      content: '';
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--gold);
      border-style: solid;
    }

    .card::before {
      top: -1px; left: -1px;
      border-width: 2px 0 0 2px;
    }

    .card::after {
      bottom: -1px; right: -1px;
      border-width: 0 2px 2px 0;
    }

    /* Inner corner accents */
    .corner-tr, .corner-bl {
      position: absolute;
      width: 24px;
      height: 24px;
      border-color: var(--gold);
      border-style: solid;
    }

    .corner-tr { top: -1px; right: -1px; border-width: 2px 2px 0 0; }
    .corner-bl { bottom: -1px; left: -1px; border-width: 0 0 2px 2px; }

    /* Shimmer top */
    .card-shimmer {
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold), transparent);
      opacity: 0.6;
      animation: shimmer 3s ease-in-out infinite;
    }

    @keyframes shimmer {
      0%, 100% { opacity: 0.3; transform: scaleX(0.5); }
      50% { opacity: 0.8; transform: scaleX(1); }
    }

    /* ── HEADER ── */
    .header {
      text-align: center;
      margin-bottom: 40px;
    }

    .emblem {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      width: 64px;
      height: 64px;
      border: 1px solid var(--border-bright);
      border-radius: 2px;
      margin-bottom: 24px;
      position: relative;
      background: rgba(212,175,55,0.04);
    }

    .emblem-inner {
      width: 32px;
      height: 32px;
      position: relative;
    }

    .emblem-diamond {
      width: 20px;
      height: 20px;
      border: 1.5px solid var(--gold);
      transform: rotate(45deg);
      position: absolute;
      top: 50%; left: 50%;
      margin: -10px 0 0 -10px;
    }

    .emblem-dot {
      width: 4px;
      height: 4px;
      background: var(--gold);
      border-radius: 50%;
      position: absolute;
      top: 50%; left: 50%;
      transform: translate(-50%, -50%);
    }

    .wordmark {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 500;
      letter-spacing: 6px;
      color: var(--gold);
      text-transform: uppercase;
      display: block;
      margin-bottom: 6px;
    }

    .tagline {
      font-size: 8px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
      font-weight: 500;
    }

    /* ── DIVIDER ── */
    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 32px;
    }

    .divider-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--border-bright));
    }

    .divider-line:last-child {
      background: linear-gradient(270deg, transparent, var(--border-bright));
    }

    .divider-icon {
      width: 6px;
      height: 6px;
      border: 1px solid var(--gold-mid);
      transform: rotate(45deg);
    }

    /* ── FORM ── */
    .form-group {
      margin-bottom: 14px;
      position: relative;
    }

    .form-label {
      display: block;
      font-size: 9px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--text-dim);
      margin-bottom: 8px;
      font-weight: 500;
    }

    .form-input-wrap {
      position: relative;
    }

    .form-icon {
      position: absolute;
      left: 14px;
      top: 50%;
      transform: translateY(-50%);
      width: 14px;
      height: 14px;
      opacity: 0.4;
    }

    input[type="email"],
    input[type="password"] {
      width: 100%;
      padding: 14px 14px 14px 40px;
      background: rgba(255,255,255,0.02);
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--text);
      font-family: 'Montserrat', sans-serif;
      font-size: 13px;
      font-weight: 300;
      outline: none;
      transition: border-color 0.3s, background 0.3s, box-shadow 0.3s;
      -webkit-appearance: none;
    }

    input[type="email"]::placeholder,
    input[type="password"]::placeholder {
      color: rgba(212,175,55,0.2);
      font-size: 11px;
      letter-spacing: 1px;
    }

    input[type="email"]:focus,
    input[type="password"]:focus {
      border-color: rgba(212,175,55,0.5);
      background: rgba(212,175,55,0.03);
      box-shadow: 0 0 0 3px rgba(212,175,55,0.05), inset 0 1px 3px rgba(0,0,0,0.3);
    }

    input:-webkit-autofill,
    input:-webkit-autofill:hover,
    input:-webkit-autofill:focus {
      -webkit-box-shadow: 0 0 0 1000px #0d0d0d inset !important;
      -webkit-text-fill-color: var(--text) !important;
      caret-color: var(--gold);
    }

    /* ── BUTTONS ── */
    .btn-primary {
      width: 100%;
      padding: 15px;
      background: linear-gradient(135deg, var(--gold-light) 0%, var(--gold) 40%, var(--gold-mid) 100%);
      border: none;
      border-radius: 2px;
      color: #000;
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 700;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: opacity 0.2s, transform 0.1s;
      margin-bottom: 10px;
    }

    .btn-primary::before {
      content: '';
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(255,255,255,0.2) 0%, transparent 50%);
      opacity: 0;
      transition: opacity 0.3s;
    }

    .btn-primary:hover::before { opacity: 1; }
    .btn-primary:active { transform: scale(0.99); opacity: 0.9; }

    .btn-secondary {
      width: 100%;
      padding: 14px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 2px;
      color: var(--gold);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 4px;
      text-transform: uppercase;
      cursor: pointer;
      transition: border-color 0.3s, background 0.3s;
      margin-bottom: 10px;
    }

    .btn-secondary:hover {
      border-color: var(--border-bright);
      background: rgba(212,175,55,0.04);
    }

    /* Separator */
    .sep {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 18px 0;
    }

    .sep-line {
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    .sep-text {
      font-size: 9px;
      letter-spacing: 3px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* Google */
    .btn-google {
      width: 100%;
      padding: 13px;
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 2px;
      color: rgba(255,255,255,0.75);
      font-family: 'Montserrat', sans-serif;
      font-size: 10px;
      font-weight: 500;
      letter-spacing: 2px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: background 0.3s, border-color 0.3s;
    }

    .btn-google:hover {
      background: rgba(255,255,255,0.07);
      border-color: rgba(255,255,255,0.2);
    }

    .google-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
    }

    /* ── FOOTER ── */
    .footer {
      text-align: center;
      margin-top: 30px;
    }

    .footer-text {
      font-size: 8px;
      letter-spacing: 2.5px;
      color: rgba(212,175,55,0.2);
      text-transform: uppercase;
    }

    .footer-text a {
      color: var(--text-dim);
      text-decoration: none;
    }

    .status-dot {
      display: inline-block;
      width: 5px;
      height: 5px;
      background: #3a7d44;
      border-radius: 50%;
      margin-right: 6px;
      animation: blink 2.5s ease-in-out infinite;
      vertical-align: middle;
      position: relative;
      top: -1px;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.3; }
    }

    /* ── MOBILE ── */
    @media (max-width: 480px) {
      body {
        align-items: flex-start;
        overflow-y: auto;
        overflow-x: hidden;
      }

      .panel {
        padding: 24px 12px 32px;
        max-width: 100%;
      }

      .card {
        padding: 36px 24px 32px;
      }

      .wordmark {
        font-size: 19px;
        letter-spacing: 5px;
      }

      .emblem {
        width: 56px;
        height: 56px;
        margin-bottom: 20px;
      }

      html, body {
        overflow: auto;
        height: auto;
      }
    }

    @media (max-width: 360px) {
      .card {
        padding: 28px 18px 28px;
      }

      .wordmark {
        font-size: 17px;
        letter-spacing: 4px;
      }
    }

    /* ── LOADING OVERLAY ── */
    .loading-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.85);
      z-index: 100;
      align-items: center;
      justify-content: center;
      flex-direction: column;
      gap: 16px;
    }

    .loading-overlay.active {
      display: flex;
    }

    .loading-ring {
      width: 40px;
      height: 40px;
      border: 1px solid var(--border);
      border-top-color: var(--gold);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .loading-text {
      font-size: 9px;
      letter-spacing: 4px;
      color: var(--text-dim);
      text-transform: uppercase;
    }

    /* ── TOAST ── */
    .toast {
      position: fixed;
      bottom: 30px;
      left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: rgba(10,10,10,0.97);
      border: 1px solid var(--border-bright);
      padding: 12px 24px;
      border-radius: 2px;
      font-size: 11px;
      letter-spacing: 1px;
      color: var(--text);
      transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      z-index: 200;
      white-space: nowrap;
      box-shadow: 0 20px 40px rgba(0,0,0,0.6);
    }

    .toast.error { border-color: rgba(220,60,60,0.5); color: #e88; }
    .toast.show { transform: translateX(-50%) translateY(0); }
  </style>
</head>

<body>

  <!-- Background -->
  <div class="bg">
    <div class="bg-grid"></div>
    <div class="bg-radial"></div>
    <div class="bg-lines"></div>
  </div>

  <!-- Loading -->
  <div class="loading-overlay" id="loadingOverlay">
    <div class="loading-ring"></div>
    <div class="loading-text">Authenticating</div>
  </div>

  <!-- Toast -->
  <div class="toast" id="toast"></div>

  <!-- Panel -->
  <div class="panel">
    <div class="card">
      <div class="corner-tr"></div>
      <div class="corner-bl"></div>
      <div class="card-shimmer"></div>

      <div class="header">
        <div class="emblem">
          <div class="emblem-inner">
            <div class="emblem-diamond"></div>
            <div class="emblem-dot"></div>
          </div>
        </div>

        <span class="wordmark">Blackridge Group</span>
        <span class="tagline">Private Investment Platform</span>
      </div>

      <div class="divider">
        <div class="divider-line"></div>
        <div class="divider-icon"></div>
        <div class="divider-line"></div>
      </div>

      <!-- Email -->
      <div class="form-group">
        <label class="form-label">Email Address</label>
        <div class="form-input-wrap">
          <svg class="form-icon" viewBox="0 0 20 20" fill="none">
            <path d="M2 5.5A1.5 1.5 0 013.5 4h13A1.5 1.5 0 0118 5.5v9A1.5 1.5 0 0116.5 16h-13A1.5 1.5 0 012 14.5v-9z" stroke="#d4af37" stroke-width="1"/>
            <path d="M2 6l8 5 8-5" stroke="#d4af37" stroke-width="1"/>
          </svg>
          <input type="email" id="email" placeholder="member@blackridge.com" autocomplete="email">
        </div>
      </div>

      <!-- Password -->
      <div class="form-group" style="margin-bottom: 28px;">
        <label class="form-label">Password</label>
        <div class="form-input-wrap">
          <svg class="form-icon" viewBox="0 0 20 20" fill="none">
            <rect x="4" y="9" width="12" height="8" rx="1" stroke="#d4af37" stroke-width="1"/>
            <path d="M7 9V6.5a3 3 0 016 0V9" stroke="#d4af37" stroke-width="1"/>
            <circle cx="10" cy="13" r="1" fill="#d4af37"/>
          </svg>
          <input type="password" id="password" placeholder="••••••••••••" autocomplete="current-password">
        </div>
      </div>

      <button class="btn-primary" onclick="login()">Access Portal</button>
      <button class="btn-secondary" onclick="register()">Create Account</button>

      <div class="sep">
        <div class="sep-line"></div>
        <span class="sep-text">or</span>
        <div class="sep-line"></div>
      </div>

      <button class="btn-google" onclick="googleLogin()">
        <svg class="google-icon" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <div class="footer">
        <p class="footer-text">
          <span class="status-dot"></span>
          Secure Connection · <span id="year"></span> Blackridge Group
        </p>
      </div>
    </div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBNSNX2u3k9wAEBRTCj9XaW4gASUWTig2E",
      authDomain: "blackridge-group.firebaseapp.com",
      projectId: "blackridge-group",
      storageBucket: "blackridge-group.firebasestorage.app",
      messagingSenderId: "761753923233",
      appId: "1:761753923233:web:2bf84e7d44b398f59c0ae0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // Utilities
    const overlay = document.getElementById('loadingOverlay');
    const toast   = document.getElementById('toast');

    function showLoading() { overlay.classList.add('active'); }
    function hideLoading() { overlay.classList.remove('active'); }

    function showToast(msg, type = '') {
      toast.textContent = msg;
      toast.className = 'toast ' + type + ' show';
      setTimeout(() => { toast.classList.remove('show'); }, 3500);
    }

    // Year
    document.getElementById('year').textContent = new Date().getFullYear();

    // EMAIL LOGIN
    window.login = function () {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) { showToast('Please enter your credentials.', 'error'); return; }

      showLoading();
      signInWithEmailAndPassword(auth, email, password)
        .then(() => { window.location.href = "main.html"; })
        .catch((error) => {
          hideLoading();
          showToast(error.message, 'error');
        });
    };

    // REGISTER
    window.register = function () {
      const email    = document.getElementById("email").value.trim();
      const password = document.getElementById("password").value;
      if (!email || !password) { showToast('Please fill in all fields.', 'error'); return; }

      showLoading();
      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          showToast('Account created successfully.');
          setTimeout(() => { window.location.href = "main.html"; }, 1000);
        })
        .catch((error) => {
          hideLoading();
          showToast(error.message, 'error');
        });
    };

    // GOOGLE LOGIN
    window.googleLogin = function () {
      showLoading();
      signInWithPopup(auth, provider)
        .then(() => { window.location.href = "main.html"; })
        .catch((error) => {
          hideLoading();
          showToast(error.message, 'error');
        });
    };

    // Enter key
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') window.login();
    });
  </script>

</body>
</html>
