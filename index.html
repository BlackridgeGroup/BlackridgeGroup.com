<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blackridge Group</title>

  <style>
    body {
      margin: 0;
      font-family: Arial;
      background: radial-gradient(circle at top, #111 0%, #000 100%);
      color: #d4af37;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 380px;
      padding: 40px;
      background: rgba(10,10,10,0.9);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 16px;
      text-align: center;
      box-shadow: 0 0 30px rgba(212,175,55,0.15);
    }

    .logo {
      width: 110px;
      margin-bottom: 20px;
    }

    h1 {
      font-size: 20px;
      letter-spacing: 2px;
      margin-bottom: 20px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 8px 0;
      background: #111;
      border: 1px solid #d4af3740;
      border-radius: 8px;
      color: #d4af37;
      outline: none;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 10px;
      background: linear-gradient(90deg, #d4af37, #a67c00);
      border: none;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      color: black;
    }

    button:hover {
      opacity: 0.9;
    }

    .google {
      background: white;
      color: black;
      margin-top: 10px;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="assets/logo.png" class="logo">

    <h1>BLACKRIDGE GROUP</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">LOGIN</button>
    <button onclick="register()">REGISTER</button>

    <button class="google" onclick="googleLogin()">Continue with Google</button>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { 
      getAuth,
      signInWithEmailAndPassword,
      createUserWithEmailAndPassword,
      GoogleAuthProvider,
      signInWithPopup
    } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBNSNX2u3k9wAEBRTCj9XaW4gASUWTig2E",
      authDomain: "blackridge-group.firebaseapp.com",
      projectId: "blackridge-group",
      storageBucket: "blackridge-group.firebasestorage.app",
      messagingSenderId: "761753923233",
      appId: "1:761753923233:web:2bf84e7d44b398f59c0ae0"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const provider = new GoogleAuthProvider();

    // EMAIL LOGIN
    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then(() => {
          window.location.href = "main.html";
        })
        .catch((error) => {
          alert("Login Error: " + error.message);
        });
    };

    // REGISTER
    window.register = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      createUserWithEmailAndPassword(auth, email, password)
        .then(() => {
          alert("Account created!");
          window.location.href = "main.html";
        })
        .catch((error) => {
          alert("Register Error: " + error.message);
        });
    };

    // GOOGLE LOGIN
    window.googleLogin = function () {
      signInWithPopup(auth, provider)
        .then(() => {
          window.location.href = "main.html";
        })
        .catch((error) => {
          alert("Google Login Error: " + error.message);
        });
    };
  </script>

</body>
</html>
