<!DOCTYPE html>
<html lang="de">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Blackridge Group</title>

  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: radial-gradient(circle at top, #111 0%, #000 100%);
      color: #d4af37;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .container {
      width: 380px;
      padding: 40px;
      background: rgba(10,10,10,0.85);
      border: 1px solid rgba(212,175,55,0.3);
      border-radius: 16px;
      box-shadow: 0 0 30px rgba(212,175,55,0.15);
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .logo {
      width: 120px;
      margin: 0 auto 20px auto;
      display: block;
    }

    h1 {
      margin: 10px 0 25px;
      font-size: 22px;
      letter-spacing: 2px;
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 10px 0;
      background: #111;
      border: 1px solid rgba(212,175,55,0.4);
      border-radius: 8px;
      color: #d4af37;
      outline: none;
    }

    input:focus {
      border-color: #d4af37;
      box-shadow: 0 0 8px rgba(212,175,55,0.3);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 15px;
      background: linear-gradient(90deg, #d4af37, #a67c00);
      border: none;
      border-radius: 8px;
      color: black;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.02);
      box-shadow: 0 0 15px rgba(212,175,55,0.4);
    }

    .footer {
      margin-top: 15px;
      font-size: 12px;
      opacity: 0.6;
    }
  </style>
</head>

<body>

  <div class="container">
    <img src="assets/logo.png" class="logo" alt="Blackridge Logo">

    <h1>BLACKRIDGE GROUP</h1>

    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">

    <button onclick="login()">SIGN IN</button>

    <div class="footer">Secure Financial Access System</div>
  </div>

  <!-- FIREBASE -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
    import { getAnalytics } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-analytics.js";
    import { getAuth, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

    const firebaseConfig = {
      apiKey: "AIzaSyBNSNX2u3k9wAEBRTCj9XaW4gASUWTig2E",
      authDomain: "blackridge-group.firebaseapp.com",
      projectId: "blackridge-group",
      storageBucket: "blackridge-group.firebasestorage.app",
      messagingSenderId: "761753923233",
      appId: "1:761753923233:web:2bf84e7d44b398f59c0ae0",
      measurementId: "G-FB0C969WDB"
    };

    const app = initializeApp(firebaseConfig);
    const analytics = getAnalytics(app);
    const auth = getAuth(app);

    window.login = function () {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      signInWithEmailAndPassword(auth, email, password)
        .then((userCredential) => {
          window.location.href = "main.html";
        })
        .catch((error) => {
          alert("Login failed: " + error.message);
        });
    };
  </script>

</body>
</html>
